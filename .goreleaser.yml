version: 2

project_name: repl-cli

builds:
  - id: repl
    main: ./cmd/repl
    binary: repl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      - AGENTS.md
      - .repl/product.md
      - .repl/framework.md
      - .repl/architecture.md

brews:
  - name: repl-cli
    repository:
      owner: replworks
      name: homebrew-tap
    homepage: "https://github.com/replworks/repl-cli"
    description: "A deterministic runtime controller for external AI-driven task execution."
    license: "MIT"
    install: |
      bin.install "repl"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: replworks
    name: repl-cli
  draft: true
  prerelease: auto

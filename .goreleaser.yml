version: 2

project_name: ai-issue

builds:
  - main: ./cmd/ai-issue
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    binary: ai-issue
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - LICENSE
      - README.md
      - PRODUCT_SPEC.md
      - ARCHITECTURE.md
      - FRAMEWORK.md

brews:
  - name: ai-issue
    repository:
      owner: replworks
      name: homebrew-tap

    homepage: "https://github.com/replworks/ai-issue"

    description: "A CLI tool to publish AI-generated ideas as GitHub Issues, clearly separating AI authorship from human responsibility."

    license: "MIT"

    install: |
      bin.install "ai-issue"

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: replworks
    name: ai-issue
  draft: true
  prerelease: auto
